      title: Man dies after crashing into parked cars on Northwest Side
      site: wgntv.com
      description: |
        A man was killed after crashing into parked vehicles on the city’s Northwest Side. Police said a 45-year-old man was traveling eastbound in a two-door sedan and came to a stop after striking three parked cars.
